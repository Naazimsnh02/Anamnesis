services:
  caddy:
    image: caddy:2-alpine
    container_name: anamnesis-caddy
    restart: always
    depends_on:
      - cognee
    networks:
      - anamnesis-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - caddy_logs:/var/log/caddy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  cognee:
    image: cognee/cognee:1.2.2
    container_name: anamnesis-cognee
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - anamnesis-network
    env_file:
      - .env
    environment:
      - DEBUG=false
      - ENV=local
      - LOG_LEVEL=INFO
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      - DB_PROVIDER=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=cognee
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=cognee_db
      - VECTOR_DB_PROVIDER=pgvector
      - VECTOR_DB_HOST=postgres
      - VECTOR_DB_PORT=5432
      - VECTOR_DB_USERNAME=cognee
      - VECTOR_DB_PASSWORD=${DB_PASSWORD}
      - VECTOR_DB_NAME=cognee_db
      # Embedded Kuzu (Cognee's "ladybug" graph engine) instead of Neo4j.
      # Phase 5 finding: Cognee's per-dataset access control creates one
      # database per dataset, and for Neo4j that means `CREATE DATABASE`,
      # which is a Neo4j Enterprise-only feature — the Community image this
      # stack ran doesn't support it, so ENABLE_BACKEND_ACCESS_CONTROL=true
      # was never actually achievable on Neo4j here. Kuzu is core to
      # cognee/cognee:1.2.2 already (no image change needed), embedded
      # (no separate service/container), and MIT-licensed. Each dataset gets
      # its own Kuzu database file under /app/.cognee_system (already the
      # existing cognee_data volume) — isolation by literal separate files.
      - GRAPH_DATABASE_PROVIDER=kuzu
      # Real per-dataset isolation, now actually achievable with Kuzu. This
      # was `false` for the single-patient hackathon build; multi-patient
      # tenancy (Phase 5) requires it — verified live that recall() leaked
      # across datasets with it off, see Docs/progress.md.
      - ENABLE_BACKEND_ACCESS_CONTROL=true
      # Second Phase 5 isolation finding: Cognee's session-QA cache
      # (SessionQAVector_text table) is keyed by user + a hardcoded
      # "default_session" string, not by dataset — confirmed by inspecting
      # the live pgvector DB directly. With one shared admin API key for the
      # whole app (every org/patient), every recall() answer semantically
      # blended in Q&A history from every other patient/org, even after the
      # source dataset was forgotten (the cache entry outlives it). Disabling
      # it entirely, since nothing in this app relies on cross-call session
      # continuity — every recall() is a fresh, standalone graph query.
      - CACHING=false
      # This instance is internet-reachable (behind Caddy/TLS), unlike the
      # local dev stack, so application-layer auth is mandatory here.
      - REQUIRE_AUTHENTICATION=true
    # No "ports:" — only reachable from other containers on anamnesis-network
    # (i.e. via Caddy). Do not publish 8000 to the host.
    volumes:
      - cognee_data:/app/.cognee_system
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 3GB
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  postgres:
    image: pgvector/pgvector:pg17
    container_name: anamnesis-postgres
    restart: always
    environment:
      POSTGRES_USER: cognee
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: cognee_db
    # No "ports:" — internal network only, never exposed to the host/internet.
    networks:
      - anamnesis-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognee -d cognee_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1GB
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

networks:
  anamnesis-network:
    name: anamnesis-network

volumes:
  postgres_data:
  cognee_data:
  caddy_data:
  caddy_config:
  caddy_logs:

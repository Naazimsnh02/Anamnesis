services:
  cognee:
    image: cognee/cognee:1.2.2
    container_name: anamnesis-cognee
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - anamnesis-network
    env_file:
      - .env
    environment:
      - DEBUG=false
      - ENV=local
      - LOG_LEVEL=INFO
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      - DB_PROVIDER=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=cognee
      - DB_PASSWORD=cognee
      - DB_NAME=cognee_db
      - VECTOR_DB_PROVIDER=pgvector
      - VECTOR_DB_HOST=postgres
      - VECTOR_DB_PORT=5432
      - VECTOR_DB_USERNAME=cognee
      - VECTOR_DB_PASSWORD=cognee
      - VECTOR_DB_NAME=cognee_db
      # Embedded Kuzu (matches the deployed GCP stack as of the Phase 5
      # migration) — no separate graph service/container needed. Each
      # dataset gets its own Kuzu database file under /app/.cognee_system
      # (the existing cognee_data volume), giving real per-dataset isolation.
      - GRAPH_DATABASE_PROVIDER=kuzu
      - ENABLE_BACKEND_ACCESS_CONTROL=true
      # Disabled: Cognee's session-QA cache is keyed by user + a hardcoded
      # session string, not by dataset, so it leaks answers across
      # patients/orgs when enabled (see Docs/progress.md, Phase 5). Matches
      # the deployed stack.
      - CACHING=false
      - REQUIRE_AUTHENTICATION=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - cognee_data:/app/.cognee_system
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8GB

  postgres:
    image: pgvector/pgvector:pg17
    container_name: anamnesis-postgres
    restart: always
    environment:
      POSTGRES_USER: cognee
      POSTGRES_PASSWORD: cognee
      POSTGRES_DB: cognee_db
    ports:
      - "5432:5432"
    networks:
      - anamnesis-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognee -d cognee_db"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  anamnesis-network:
    name: anamnesis-network

volumes:
  postgres_data:
  cognee_data:

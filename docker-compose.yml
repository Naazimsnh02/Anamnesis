services:
  cognee:
    image: cognee/cognee:1.2.2
    container_name: anamnesis-cognee
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - anamnesis-network
    env_file:
      - .env
    environment:
      - DEBUG=false
      - ENV=local
      - LOG_LEVEL=INFO
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      - DB_PROVIDER=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=cognee
      - DB_PASSWORD=cognee
      - DB_NAME=cognee_db
      - VECTOR_DB_PROVIDER=pgvector
      - VECTOR_DB_HOST=postgres
      - VECTOR_DB_PORT=5432
      - VECTOR_DB_USERNAME=cognee
      - VECTOR_DB_PASSWORD=cognee
      - VECTOR_DB_NAME=cognee_db
      - GRAPH_DATABASE_PROVIDER=neo4j
      - GRAPH_DATABASE_URL=bolt://neo4j:7687
      - GRAPH_DATABASE_USERNAME=neo4j
      - GRAPH_DATABASE_PASSWORD=${NEO4J_PASSWORD:-pleaseletmein}
      # Single-tenant hackathon demo: no per-user/dataset isolation needed, and
      # backend access control's supported graph backends (KuzuDB /
      # neo4j_aura_dev) don't include a plain self-hosted Neo4j container.
      - ENABLE_BACKEND_ACCESS_CONTROL=false
      - REQUIRE_AUTHENTICATION=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - cognee_data:/app/.cognee_system
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "4.0"
          memory: 8GB

  postgres:
    image: pgvector/pgvector:pg17
    container_name: anamnesis-postgres
    restart: always
    environment:
      POSTGRES_USER: cognee
      POSTGRES_PASSWORD: cognee
      POSTGRES_DB: cognee_db
    ports:
      - "5432:5432"
    networks:
      - anamnesis-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cognee -d cognee_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.26
    container_name: anamnesis-neo4j
    restart: always
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-pleaseletmein}
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
    ports:
      - "7474:7474" # Neo4j Browser (useful for debugging the memory graph)
      - "7687:7687" # Bolt
    networks:
      - anamnesis-network
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

networks:
  anamnesis-network:
    name: anamnesis-network

volumes:
  postgres_data:
  neo4j_data:
  cognee_data:
